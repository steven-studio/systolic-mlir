# hls_config_full_precision.cfg
#
# Vitis Unified IDE (2025.x / 2026.1) config-file flow, replacing the
# classic `vitis_hls -f run_hls.tcl` script -- that classic flow no
# longer exists as a standalone vitis_hls executable in this install
# (confirmed: no vitis_hls binary under Vitis/bin/), so this uses the
# new v++ --mode hls / vitis-run --mode hls command-line flow instead.
#
# Run from ~/systolic-mlir/hls/gemm_4x4/:
#
#   1. (optional) C simulation first, to sanity-check before synthesis:
#      vitis-run --mode hls --csim --config hls_config_full_precision.cfg \
#          --work_dir work_full_precision
#
#   2. Synthesis (the step that actually applies the impl:fulldsp setting):
#      v++ -c --mode hls --config hls_config_full_precision.cfg \
#          --work_dir work_full_precision
#
# This creates a NEW work_dir (work_full_precision/), separate from
# whatever directory your original synthesis used, so the original
# results are untouched for side-by-side comparison.
#
# IMPORTANT CAVEATS:
#   - This command-line flow (v++ --mode hls, vitis-run --mode hls) is
#     confirmed from AMD's UG1702/UG1399 documentation for the 2025.x
#     Vitis Unified IDE, but I have not run it myself against your
#     specific 2026.1 install -- if v++ or vitis-run reject any option
#     below, run `v++ --mode hls -h` (or ask 蔡老師, since this tooling
#     changed recently enough that even he may not have hit it yet) to
#     get the exact accepted syntax for this build.
#   - flow_target's exact value for "export as Vivado IP" (as opposed to
#     a Vitis kernel .xo) may need adjusting -- try `vivado` first; if
#     rejected, check the config file command reference for the exact
#     accepted string in this version.

part=xc7z020clg400-1

[hls]
syn.file=./design.cpp
syn.top=matmul_4x4x4
flow_target=vivado
clock=10ns
syn.output.format=ip_catalog

# The actual change under test: pin floating-point multiply and add to
# "Full Usage" of DSP resources (impl:fulldsp), instead of letting the
# tool choose (the default, impl:all, which is what your original
# synthesis used and is the likely source of the 7-30 ULP baseline
# error reported in Section eval-correctness).

tb.file=./testbench.cpp
